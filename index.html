<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="checklist1.png">
</head>

<body>

    <div class="background-elements">
        <i class="fas fa-pencil-alt sticker"></i>
        <i class="fas fa-book sticker"></i>
        <i class="fas fa-graduation-cap sticker"></i>
        <i class="fas fa-apple-alt sticker"></i>
        <i class="fas fa-atom sticker"></i>
        <i class="fas fa-brain sticker"></i>
        <i class="fas fa-lightbulb sticker"></i>
        <i class="fas fa-calculator sticker"></i>
    </div>
    <div class="theme-toggle">
        <button class="theme-btn" id="themeBtn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="user-session">
        <span id="userEmail"></span>
        <button onclick="logout()" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <div class="main-wrapper">

        <div class="todo-container">
            <header>
                <div class="header-text">
                    <h1>My Tasks</h1>
                    <p id="dateDisplay"></p>
                </div>
                <img src="check-list.png" alt="Checklist Icon" class="title-icon">
            </header>

            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Write a new task...">
                <button id="addBtn" onclick="addTask()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="taskList"></ul>

            <div class="stats-section">
                <span id="itemsLeft">0 items left</span>
                <button id="clearCompleted" onclick="clearCompleted()">Clear Completed</button>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>

</html>
